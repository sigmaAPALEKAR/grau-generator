<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grau Generator</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:black;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
animation:fadeIn 2s forwards;
}

h1{
font-weight:300;
letter-spacing:4px;
}

input{
background:transparent;
border:none;
border-bottom:1px solid rgba(255,255,255,0.5);
color:white;
font-size:22px;
text-align:center;
padding:10px 0;
outline:none;
width:220px;
margin-top:30px;
}

.loading{
font-size:30px;
letter-spacing:3px;
}

.result{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:24vw;
font-weight:600;
letter-spacing:10px;
opacity:0;
animation:fadeIn 2s forwards;
z-index:2;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container" id="inputScreen">
<h1>please enter a name</h1>
<input id="nameInput" autocomplete="off">
</div>

<script>

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3,
size:Math.random()*2
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(animate)

}

animate()

/* INPUT */

const input=document.getElementById("nameInput")

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
startGeneration(input.value.trim())
}
})

/* VOWEL CHECK (Y REMOVED) */

function isVowel(c){
return "aeiou".includes(c.toLowerCase())
}

/* GRAU GENERATION */

function generateGrau(name){

name=name.toLowerCase()

if(name.length<2) return (name+"rau").toUpperCase()

if(!isVowel(name[1])){
return (name[0]+"rau").toUpperCase()
}

let result=name[0]
let i=1

while(i<name.length && isVowel(name[i])){
result+=name[i]
i++
}

result+="rau"

return result.toUpperCase()
}

/* GENERATION FLOW */

function startGeneration(name){

if(!name)return

const container=document.getElementById("inputScreen")

container.innerHTML='<div class="loading" id="loadingText">generating your grau...</div>'

const messages=[
"generating your grau...",
"grau incoming...",
"processing phonetics...",
"constructing rau suffix...",
"finalizing grau..."
]

let index=0
const loadingText=document.getElementById("loadingText")

const interval=setInterval(()=>{
index=(index+1)%messages.length
loadingText.textContent=messages[index]
},700)

setTimeout(()=>{

clearInterval(interval)

const grau=generateGrau(name)

/* remove loading screen */
container.remove()

/* show final grau */
document.body.insertAdjacentHTML("beforeend",
'<div class="result">'+grau+'</div>'
)

},5000)

}

</script>

</body>
</html>
